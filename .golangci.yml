version: "2"
run:
  concurrency: 4
linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 30
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - style
    gocyclo:
      min-complexity: 15
    govet:
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
    lll:
      line-length: 140
    misspell:
      locale: US
    nilnil:
      checked-types:
        - chan
        - func
        - iface
        - ptr
        - uintptr
        - unsafeptr
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - gocognit
        path: _test\.go
      # GORM repo CRUD methods share SQL column names ("updated_at",
      # "deleted_at", "deleted_by", "type") and per-entity Update bodies
      # look duplicate-ish even though they mutate different fields.
      - linters:
          - dupl
          - goconst
        path: internal/repo/
      # Per-resource HTTP handlers (one file per resource) follow the
      # same shape — bind request -> service call -> respond. They
      # legitimately read similar because each binds/responds different
      # types; sharing the boilerplate would obscure routing.
      - linters:
          - dupl
        path: internal/delivery/http/v1/
    paths:
      - third_party$
      - builtin$
      - examples$
      - web/node_modules
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - web/node_modules
