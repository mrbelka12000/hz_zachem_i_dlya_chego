http:
  port: "8080"

postgres:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "hz_zachem_storage"
  sslmode: "disable"

rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"
  exchange: "events"
  queue: "hz_zachem_queue"

worker:
  interval: "1h"

auth:
  jwt_secret: "dev-only-change-me-32-bytes-min!!"
  access_ttl: "15m"
  refresh_ttl: "720h"
  cookie_name: "session"
  cookie_domain: ""
  secure_cookie: false

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

csrf:
  secret: "dev-only-csrf-secret-change-me-32"
