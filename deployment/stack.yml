version: "3.8"

services:
  service:
    image: ghcr.io/mrbelka12000/hz_zachem:prod
    environment:
      HTTP_PORT: "8080"

      POSTGRES_HOST: "host.docker.internal"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "hz_zachem"
      POSTGRES_PASSWORD: "replace-with-strong-password"
      POSTGRES_DB: "hz_zachem_storage"
      POSTGRES_SSLMODE: "disable"

      RABBITMQ_URL: "amqp://guest:guest@host.docker.internal:5672/"
      RABBITMQ_EXCHANGE: "events"
      RABBITMQ_QUEUE: "hz_zachem_queue"

      WORKER_INTERVAL: "1h"

      AUTH_JWT_SECRET: "replace-with-32+byte-random-secret"
      AUTH_ACCESS_TTL: "15m"
      AUTH_REFRESH_TTL: "720h"
      AUTH_COOKIE_NAME: "session"
      AUTH_COOKIE_DOMAIN: ""
      AUTH_SECURE_COOKIE: "true"

      CORS_ALLOWED_ORIGINS: "https://hz-zachem.example.com"

      CSRF_SECRET: "replace-with-32+byte-random-secret"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hz_zachem
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

networks:
  hz_zachem:
    driver: overlay
    attachable: true
